name: Anypoint CI/CD with Maven and GitHub Actions
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Read credentials and Generate settings.xml
        run: |
          CLIENT_ID=$(grep '^anypoint.client.id' src/main/resources/config.properties | cut -d'=' -f2 | tr -d ' ')
          CLIENT_SECRET=$(grep '^anypoint.client.secret' src/main/resources/config.properties | cut -d'=' -f2 | tr -d ' ')
          
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${CLIENT_ID}~?~${CLIENT_SECRET}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Maven Build
        run: mvn clean package -DskipMunitTests=true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mule-artifact
          path: target/*.jar

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Read credentials and Generate settings.xml
        run: |
          CLIENT_ID=$(grep '^anypoint.client.id' src/main/resources/config.properties | cut -d'=' -f2 | tr -d ' ')
          CLIENT_SECRET=$(grep '^anypoint.client.secret' src/main/resources/config.properties | cut -d'=' -f2 | tr -d ' ')
          ANYPOINT_ENV=$(grep '^anypoint.env' src/main/resources/config.properties | cut -d'=' -f2 | tr -d ' ')
          MULE_APP_NAME=$(grep '^mule.app.name' src/main/resources/config.properties | cut -d'=' -f2 | tr -d ' ')

          # Store in GITHUB_ENV for the deploy step
          echo "ANYPOINT_ENV=$ANYPOINT_ENV" >> $GITHUB_ENV
          echo "MULE_APP_NAME=$MULE_APP_NAME" >> $GITHUB_ENV
          echo "ANYPOINT_CLIENT_ID=$CLIENT_ID" >> $GITHUB_ENV
          echo "ANYPOINT_CLIENT_SECRET=$CLIENT_SECRET" >> $GITHUB_ENV

          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>${CLIENT_ID}~?~${CLIENT_SECRET}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: mule-artifact

      - name: Deploy to Anypoint Platform
        run: |
          mvn deploy -DmuleDeploy -U -e \
            -Danypoint.client.id=${{ env.ANYPOINT_CLIENT_ID }} \
            -Danypoint.client.secret=${{ env.ANYPOINT_CLIENT_SECRET }} \
            -Danypoint.env=${{ env.ANYPOINT_ENV }} \
            -Dmule.app.name=${{ env.MULE_APP_NAME }}        env:
          ANYPOINT_CLIENT_ID: ${{ env.ANYPOINT_CLIENT_ID }}
          ANYPOINT_CLIENT_SECRET: ${{ env.ANYPOINT_CLIENT_SECRET }}
          ANYPOINT_ENV: ${{ env.ANYPOINT_ENV }}
          MULE_APP_NAME: ${{ env.MULE_APP_NAME }}
